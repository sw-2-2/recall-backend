name: Recall Project CI/CD

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  # 1. CI 단계: 빌드 및 테스트
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 테스트 및 검증
      - name: Build and Test with Gradle
        run: ./gradlew build -x test

  # 2. CD 단계: EC2 배포
  deploy:
    needs: build-and-test # CI가 성공해야만 실행됨
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # EC2에 파일을 전송하고 명령어를 실행하기 위한 SSH 설정
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/recall
            
            # 브랜치 고정 및 최신화
            git fetch origin main
            git checkout main
            git pull origin main
            
            # .env 파일 생성
            echo "DB_NAME=${{ secrets.DB_NAME }}" > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
            echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env
            echo "JPA_DDL_AUTO=${{ secrets.JPA_DDL_AUTO }}" >> .env
            
            # 기존 컨테이너 중지 및 이미지 빌드/실행
            docker compose down
            docker compose up -d --build
            
            # 사용하지 않는 이미지/컨테이너 정리 (EC2 용량 관리)
            docker system prune -f