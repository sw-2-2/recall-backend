spring:
  application:
    name: recall

  datasource:
    # 도커 내부에서는 서비스명인 'postgres'를 사용하도록 유도
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:recall_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:password123}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

