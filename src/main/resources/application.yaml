spring:
  application:
    name: recall

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:recall_db}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # 연관된 초/중/고 정보를 한 번의 IN 절로 가져오도록 설정 (Lazy Loading, N+1 대책)
        default_batch_fetch_size: 1000